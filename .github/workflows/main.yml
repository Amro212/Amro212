name: generate pacman game

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate pacman contribution graph SVGs
        run: |
          mkdir -p dist
          npx pacman-contribution-graph --platform github --gameTheme github --username "${{ github.repository_owner }}" --output dist/pacman-contribution-graph.svg
          npx pacman-contribution-graph --platform github --gameTheme github-dark --username "${{ github.repository_owner }}" --output dist/pacman-contribution-graph-dark.svg

      - name: Deploy generated SVGs to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}